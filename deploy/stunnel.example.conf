# stunnel — mTLS sidecar for the Fram coordinator over an untrusted link.
# ============================================================================
# The coordinator wire protocol is UNAUTHENTICATED and (on babashka) cannot
# terminate TLS itself — babashka's native image has no server-side
# SSLServerSocket. So to expose a coordinator across an untrusted network,
# wrap it in stunnel: the coordinator keeps binding LOOPBACK (FRAM_BIND unset),
# and stunnel provides the mutually-authenticated TLS transport. The EDN wire
# protocol is byte-identical inside the tunnel, so this needs ZERO Fram changes.
#
#   gateway host ──TLS(mTLS)──▶ stunnel(coordinator host) ──loopback plaintext──▶ coordinator
#
# Generate certs with keytool/openssl: a CA, a coordinator server cert, and a
# gateway client cert; put the peer's CA in each `CAfile`. Never publish 7901
# beyond the gateway's network path.
# ============================================================================

# ---- ON THE COORDINATOR HOST (TLS server; requires + verifies the client) ----
# Run the Fram coordinator on loopback (default): bin/fram-daemon 7977
# Then stunnel terminates TLS on :7901 and forwards to the loopback daemon.
[fram-coordinator]
accept  = 0.0.0.0:7901
connect = 127.0.0.1:7977
cert    = /etc/fram/tls/coordinator.crt
key     = /etc/fram/tls/coordinator.key
CAfile  = /etc/fram/tls/client-ca.crt
verify  = 2            ; require + verify the client cert chain to CAfile (mTLS)
sslVersion = TLSv1.3

# ---- ON THE GATEWAY HOST (TLS client; presents the gateway cert) -------------
# The gateway connects PLAINTEXT to 127.0.0.1:7902; stunnel TLS-connects out to
# the coordinator host presenting the gateway client cert. Point the gateway's
# tenant registry :coordinator-host/:coordinator-port at 127.0.0.1:7902.
#
# [fram-coordinator-client]
# client  = yes
# accept  = 127.0.0.1:7902
# connect = coordinator-host.private:7901
# cert    = /etc/fram/tls/gateway.crt
# key     = /etc/fram/tls/gateway.key
# CAfile  = /etc/fram/tls/coordinator-ca.crt
# verify  = 2
# sslVersion = TLSv1.3
